  #         chmod +x scripts/schema-diff.sh
  #         export PATH="$(go env GOPATH)/bin:$PATH"
  #         ./scripts/schema-diff.sh --proto .   # uses the committed proto.lock
  # ---------------------------------------------------------------------------
